<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Barrington Home Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f3f0;
            --surface: #ffffff;
            --surface-alt: #faf9f7;
            --border: #e8e5e0;
            --border-focus: #c4bfb8;
            --text: #1a1814;
            --text-secondary: #6b6560;
            --text-muted: #9c9690;
            --accent: #2563eb;
            --accent-soft: #eff4ff;
            --green: #16a34a;
            --green-soft: #f0fdf4;
            --red: #dc2626;
            --red-soft: #fef2f2;
            --orange: #d97706;
            --orange-soft: #fffbeb;
            --purple: #7c3aed;
            --purple-soft: #f5f3ff;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        input, textarea, button, select {
            font-family: inherit;
            font-size: inherit;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        button, [role="button"] {
            -webkit-user-select: none;
            user-select: none;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            :root { --radius: 12px; --radius-sm: 8px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const API = '';

        async function api(path, options = {}) {
            const res = await fetch(`${API}/api${path}`, {
                headers: { 'Content-Type': 'application/json', ...options.headers },
                ...options,
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: 'Request failed' }));
                throw new Error(err.detail?.message || err.detail || 'Request failed');
            }
            return res.json();
        }

        function VerdictBadge({ verdict }) {
            const config = {
                strong_buy: { label: 'Strong Buy', bg: 'var(--green-soft)', color: 'var(--green)' },
                fair_deal: { label: 'Fair Deal', bg: 'var(--accent-soft)', color: 'var(--accent)' },
                overpriced: { label: 'Overpriced', bg: 'var(--orange-soft)', color: 'var(--orange)' },
                pass: { label: 'Pass', bg: 'var(--red-soft)', color: 'var(--red)' },
            };
            const c = config[verdict] || { label: 'Analyzing...', bg: 'var(--surface-alt)', color: 'var(--text-muted)' };
            return (
                <span style={{
                    display: 'inline-block', padding: '4px 10px', borderRadius: 6,
                    fontSize: 12, fontWeight: 600, background: c.bg, color: c.color,
                    letterSpacing: '0.02em',
                }}>{c.label}</span>
            );
        }

        function ScoreDot({ value, max = 10, label, size = 36 }) {
            if (value == null) return null;
            const pct = value / max;
            const color = pct >= 0.7 ? 'var(--green)' : pct >= 0.5 ? 'var(--orange)' : 'var(--red)';
            return (
                <div style={{ textAlign: 'center' }}>
                    <div style={{
                        width: size, height: size, borderRadius: '50%',
                        border: `2.5px solid ${color}`, display: 'flex',
                        alignItems: 'center', justifyContent: 'center',
                        fontSize: size * 0.36, fontWeight: 700, color,
                    }}>{typeof value === 'number' ? (value % 1 === 0 ? value : value.toFixed(1)) : value}</div>
                    {label && <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 3, fontWeight: 500 }}>{label}</div>}
                </div>
            );
        }

        function PriceBadge({ pct }) {
            if (pct == null) return null;
            const isGood = pct < -3;
            const isBad = pct > 5;
            const color = isGood ? 'var(--green)' : isBad ? 'var(--red)' : 'var(--text-secondary)';
            const bg = isGood ? 'var(--green-soft)' : isBad ? 'var(--red-soft)' : 'var(--surface-alt)';
            const sign = pct > 0 ? '+' : '';
            return (
                <span style={{
                    display: 'inline-block', padding: '3px 8px', borderRadius: 5,
                    fontSize: 11, fontWeight: 600, background: bg, color,
                    fontFamily: 'var(--mono)',
                }}>{sign}{pct.toFixed(1)}% vs comps</span>
            );
        }

        function StarRating({ rating, onChange, size = 24 }) {
            return (
                <div style={{ display: 'flex', gap: 2 }}>
                    {[1, 2, 3, 4, 5].map(star => (
                        <button key={star} onClick={() => onChange?.(star)} style={{
                            background: 'none', border: 'none', padding: 2,
                            fontSize: size, color: star <= (rating || 0) ? '#f59e0b' : 'var(--border)',
                            transition: 'color 0.15s',
                        }}>★</button>
                    ))}
                </div>
            );
        }

        function ListingCard({ listing, onClick }) {
            const price = listing.price ? `$${listing.price.toLocaleString()}` : 'Price TBD';
            const details = [
                listing.bedrooms && `${listing.bedrooms}bd`,
                listing.bathrooms && `${listing.bathrooms}ba`,
                listing.sqft && `${listing.sqft.toLocaleString()} sqft`,
                listing.year_built && `Built ${listing.year_built}`,
            ].filter(Boolean).join('  ·  ');

            return (
                <button onClick={onClick} style={{
                    display: 'block', width: '100%', textAlign: 'left',
                    background: 'var(--surface)', borderRadius: 'var(--radius)',
                    border: '1px solid var(--border)', overflow: 'hidden',
                    boxShadow: 'var(--shadow)', transition: 'box-shadow 0.2s, border-color 0.2s',
                    padding: 0,
                }} onMouseEnter={e => { e.currentTarget.style.boxShadow = 'var(--shadow-md)'; e.currentTarget.style.borderColor = 'var(--border-focus)'; }}
                   onMouseLeave={e => { e.currentTarget.style.boxShadow = 'var(--shadow)'; e.currentTarget.style.borderColor = 'var(--border)'; }}>
                    <div style={{
                        height: 180, background: 'var(--surface-alt)',
                        backgroundImage: listing.photo ? `url(${listing.photo})` : 'none',
                        backgroundSize: 'cover', backgroundPosition: 'center',
                        position: 'relative',
                    }}>
                        {!listing.photo && (
                            <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)', fontSize: 14 }}>No photo yet</div>
                        )}
                        {listing.verdict && (
                            <div style={{ position: 'absolute', top: 10, right: 10 }}>
                                <VerdictBadge verdict={listing.verdict} />
                            </div>
                        )}
                        {listing.user_rating && (
                            <div style={{ position: 'absolute', top: 10, left: 10, background: 'rgba(0,0,0,0.6)', borderRadius: 6, padding: '3px 7px', color: '#f59e0b', fontSize: 13, fontWeight: 600 }}>
                                {'★'.repeat(listing.user_rating)}
                            </div>
                        )}
                    </div>
                    <div style={{ padding: '14px 16px' }}>
                        <div style={{ fontSize: 20, fontWeight: 700, color: 'var(--text)', marginBottom: 2 }}>{price}</div>
                        <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 6, fontWeight: 500 }}>{details}</div>
                        <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 10, lineHeight: 1.3,
                            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {listing.address || 'Address pending...'}
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            <ScoreDot value={listing.overall_score} label="Score" size={32} />
                            <ScoreDot value={listing.school_score} label="Schools" size={32} />
                            <PriceBadge pct={listing.price_vs_comps_pct} />
                        </div>
                    </div>
                </button>
            );
        }

        function AddListingModal({ isOpen, onClose, onAdd }) {
            const [url, setUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const inputRef = useRef(null);

            useEffect(() => {
                if (isOpen) {
                    setUrl(''); setError('');
                    setTimeout(() => inputRef.current?.focus(), 100);
                }
            }, [isOpen]);

            const handleSubmit = async () => {
                if (!url.trim()) return;
                setLoading(true); setError('');
                try {
                    const listing = await api('/listings', {
                        method: 'POST',
                        body: JSON.stringify({ url: url.trim() }),
                    });
                    onAdd(listing);
                    onClose();
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div style={{ position: 'fixed', inset: 0, zIndex: 100, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}
                     onClick={onClose}>
                    <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.3)', backdropFilter: 'blur(4px)' }} />
                    <div onClick={e => e.stopPropagation()} style={{
                        position: 'relative', background: 'var(--surface)', borderRadius: '20px 20px 0 0',
                        width: '100%', maxWidth: 560, padding: '28px 24px 40px',
                        boxShadow: '0 -8px 30px rgba(0,0,0,0.12)',
                    }}>
                        <div style={{ width: 36, height: 4, background: 'var(--border)', borderRadius: 2, margin: '0 auto 20px' }} />
                        <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>Add a Listing</h2>
                        <p style={{ fontSize: 14, color: 'var(--text-secondary)', marginBottom: 20 }}>
                            Paste a Zillow or Redfin URL and we'll pull all the details automatically.
                        </p>
                        <input
                            ref={inputRef}
                            type="url"
                            value={url}
                            onChange={e => setUrl(e.target.value)}
                            placeholder="https://www.redfin.com/RI/Barrington/..."
                            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                            style={{
                                width: '100%', padding: '14px 16px', fontSize: 16,
                                border: '1.5px solid var(--border)', borderRadius: 'var(--radius-sm)',
                                outline: 'none', background: 'var(--surface-alt)',
                                transition: 'border-color 0.2s',
                            }}
                            onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                            onBlur={e => e.target.style.borderColor = 'var(--border)'}
                        />
                        {error && (
                            <div style={{ marginTop: 10, padding: '10px 14px', background: 'var(--red-soft)',
                                color: 'var(--red)', borderRadius: 'var(--radius-sm)', fontSize: 13, fontWeight: 500 }}>
                                {error}
                            </div>
                        )}
                        <button onClick={handleSubmit} disabled={loading || !url.trim()} style={{
                            width: '100%', marginTop: 16, padding: '14px', fontSize: 16, fontWeight: 600,
                            background: loading ? 'var(--border)' : 'var(--accent)',
                            color: '#fff', border: 'none', borderRadius: 'var(--radius-sm)',
                            opacity: (!url.trim() || loading) ? 0.5 : 1, transition: 'opacity 0.2s',
                        }}>
                            {loading ? 'Fetching listing data...' : 'Track This Home'}
                        </button>
                    </div>
                </div>
            );
        }

        function DetailView({ listingId, onBack }) {
            const [listing, setListing] = useState(null);
            const [loading, setLoading] = useState(true);
            const [noteText, setNoteText] = useState('');
            const [rating, setRating] = useState(0);

            useEffect(() => {
                setLoading(true);
                api(`/listings/${listingId}`)
                    .then(data => {
                        setListing(data);
                        if (data.notes?.[0]) {
                            setNoteText(data.notes[0].content || '');
                            setRating(data.notes[0].rating || 0);
                        }
                    })
                    .catch(console.error)
                    .finally(() => setLoading(false));
            }, [listingId]);

            const saveNotes = async () => {
                try {
                    await api(`/listings/${listingId}/notes`, {
                        method: 'POST',
                        body: JSON.stringify({ content: noteText, rating }),
                    });
                } catch (e) {
                    console.error('Failed to save notes:', e);
                }
            };

            const reanalyze = async () => {
                try {
                    await api(`/listings/${listingId}/reanalyze`, { method: 'POST' });
                    setTimeout(() => {
                        api(`/listings/${listingId}`).then(setListing);
                    }, 5000);
                } catch (e) {
                    console.error('Reanalysis failed:', e);
                }
            };

            if (loading) return (
                <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-muted)' }}>Loading listing details...</div>
            );
            if (!listing) return (
                <div style={{ padding: 40, textAlign: 'center', color: 'var(--text-muted)' }}>Listing not found</div>
            );

            const price = listing.price ? `$${listing.price.toLocaleString()}` : 'Price TBD';
            const s = listing.scores || {};
            const ai = listing.ai_summary || {};

            return (
                <div style={{ maxWidth: 700, margin: '0 auto', padding: '20px 16px 60px' }}>
                    <button onClick={onBack} style={{
                        background: 'none', border: 'none', color: 'var(--accent)',
                        fontSize: 15, fontWeight: 600, padding: '8px 0', marginBottom: 12,
                        display: 'flex', alignItems: 'center', gap: 6,
                    }}>← All Listings</button>

                    <div style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 28, fontWeight: 700, marginBottom: 4 }}>{price}</div>
                        <div style={{ fontSize: 16, color: 'var(--text-secondary)' }}>{listing.address || 'Address pending'}</div>
                        <div style={{ fontSize: 14, color: 'var(--text-muted)', marginTop: 4 }}>
                            {[listing.bedrooms && `${listing.bedrooms} bed`, listing.bathrooms && `${listing.bathrooms} bath`,
                              listing.sqft && `${listing.sqft.toLocaleString()} sqft`, listing.year_built && `Built ${listing.year_built}`,
                              listing.lot_sqft && `${listing.lot_sqft.toLocaleString()} sqft lot`].filter(Boolean).join('  ·  ')}
                        </div>
                    </div>

                    {listing.photos?.length > 0 && (
                        <div style={{ display: 'flex', gap: 8, overflowX: 'auto', marginBottom: 24, paddingBottom: 4,
                            WebkitOverflowScrolling: 'touch', scrollSnapType: 'x mandatory' }}>
                            {listing.photos.slice(0, 8).map((url, i) => (
                                <img key={i} src={url} alt={`Photo ${i + 1}`} style={{
                                    height: 200, borderRadius: 'var(--radius-sm)', objectFit: 'cover',
                                    flexShrink: 0, scrollSnapAlign: 'start', minWidth: 280,
                                }} />
                            ))}
                        </div>
                    )}

                    <div style={{
                        display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))',
                        gap: 12, marginBottom: 24,
                    }}>
                        {s.overall_score != null && (
                            <ScoreCard label="Overall Score" value={s.overall_score} max={10} />
                        )}
                        {s.price_vs_comps_pct != null && (
                            <div style={{ background: 'var(--surface)', borderRadius: 'var(--radius-sm)',
                                border: '1px solid var(--border)', padding: 16, textAlign: 'center' }}>
                                <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600,
                                    textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>vs Comps</div>
                                <PriceBadge pct={s.price_vs_comps_pct} />
                                {s.price_per_sqft && (
                                    <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 6 }}>
                                        ${s.price_per_sqft}/sqft
                                    </div>
                                )}
                            </div>
                        )}
                        {s.school_score != null && (
                            <ScoreCard label="Schools" value={s.school_score} max={10}
                                detail={s.high_school || s.elementary_school} />
                        )}
                        {s.flood_risk && (
                            <div style={{ background: 'var(--surface)', borderRadius: 'var(--radius-sm)',
                                border: '1px solid var(--border)', padding: 16, textAlign: 'center' }}>
                                <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600,
                                    textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Flood Risk</div>
                                <div style={{ fontSize: 18, fontWeight: 700, textTransform: 'capitalize',
                                    color: s.flood_risk === 'minimal' ? 'var(--green)' : s.flood_risk === 'high' ? 'var(--red)' : 'var(--orange)' }}>
                                    {s.flood_risk}
                                </div>
                            </div>
                        )}
                    </div>

                    {(ai.summary || ai.pros || ai.cons) && (
                        <div style={{ background: 'var(--surface)', borderRadius: 'var(--radius)',
                            border: '1px solid var(--border)', padding: 20, marginBottom: 24 }}>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                                <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--purple)',
                                    textTransform: 'uppercase', letterSpacing: '0.05em' }}>AI Analysis</div>
                                {ai.verdict && <VerdictBadge verdict={ai.verdict} />}
                            </div>
                            {ai.summary && <p style={{ fontSize: 15, lineHeight: 1.6, color: 'var(--text)', marginBottom: 16 }}>{ai.summary}</p>}
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                                {ai.pros?.length > 0 && (
                                    <div>
                                        <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--green)', marginBottom: 6 }}>Pros</div>
                                        {ai.pros.map((p, i) => (
                                            <div key={i} style={{ fontSize: 13, color: 'var(--text-secondary)', padding: '4px 0', lineHeight: 1.4 }}>
                                                + {p}
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {ai.cons?.length > 0 && (
                                    <div>
                                        <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--red)', marginBottom: 6 }}>Cons</div>
                                        {ai.cons.map((c, i) => (
                                            <div key={i} style={{ fontSize: 13, color: 'var(--text-secondary)', padding: '4px 0', lineHeight: 1.4 }}>
                                                − {c}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {listing.comps?.length > 0 && (
                        <div style={{ background: 'var(--surface)', borderRadius: 'var(--radius)',
                            border: '1px solid var(--border)', padding: 20, marginBottom: 24 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, textTransform: 'uppercase',
                                letterSpacing: '0.05em', color: 'var(--text-secondary)', marginBottom: 14 }}>
                                Comparable Sales ({listing.comps.length})
                            </div>
                            {listing.comps.slice(0, 6).map((comp, i) => (
                                <div key={i} style={{
                                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                    padding: '10px 0', borderBottom: i < Math.min(listing.comps.length, 6) - 1 ? '1px solid var(--border)' : 'none',
                                }}>
                                    <div>
                                        <div style={{ fontSize: 14, fontWeight: 500 }}>{comp.address || 'Nearby home'}</div>
                                        <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>
                                            {[comp.bedrooms && `${comp.bedrooms}bd`, comp.sqft && `${comp.sqft.toLocaleString()} sqft`,
                                              comp.distance_miles && `${comp.distance_miles.toFixed(1)} mi`].filter(Boolean).join(' · ')}
                                        </div>
                                    </div>
                                    <div style={{ textAlign: 'right' }}>
                                        <div style={{ fontSize: 14, fontWeight: 600 }}>
                                            {comp.sold_price ? `$${comp.sold_price.toLocaleString()}` : '—'}
                                        </div>
                                        {comp.price_per_sqft && (
                                            <div style={{ fontSize: 11, color: 'var(--text-muted)', fontFamily: 'var(--mono)' }}>
                                                ${comp.price_per_sqft}/sqft
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {listing.description && (
                        <div style={{ background: 'var(--surface)', borderRadius: 'var(--radius)',
                            border: '1px solid var(--border)', padding: 20, marginBottom: 24 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, textTransform: 'uppercase',
                                letterSpacing: '0.05em', color: 'var(--text-secondary)', marginBottom: 10 }}>Description</div>
                            <p style={{ fontSize: 14, lineHeight: 1.65, color: 'var(--text-secondary)' }}>{listing.description}</p>
                        </div>
                    )}

                    <div style={{ background: 'var(--surface)', borderRadius: 'var(--radius)',
                        border: '1px solid var(--border)', padding: 20, marginBottom: 24 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, textTransform: 'uppercase',
                            letterSpacing: '0.05em', color: 'var(--text-secondary)', marginBottom: 14 }}>Your Notes</div>
                        <div style={{ marginBottom: 14 }}>
                            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 6 }}>Your Rating</div>
                            <StarRating rating={rating} onChange={r => { setRating(r); }} size={28} />
                        </div>
                        <textarea
                            value={noteText}
                            onChange={e => setNoteText(e.target.value)}
                            placeholder="Loved the kitchen, but the backyard was small..."
                            rows={4}
                            style={{
                                width: '100%', padding: 12, border: '1.5px solid var(--border)',
                                borderRadius: 'var(--radius-sm)', fontSize: 14, lineHeight: 1.5,
                                resize: 'vertical', outline: 'none', background: 'var(--surface-alt)',
                            }}
                            onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                            onBlur={e => e.target.style.borderColor = 'var(--border)'}
                        />
                        <button onClick={saveNotes} style={{
                            marginTop: 10, padding: '10px 20px', fontSize: 14, fontWeight: 600,
                            background: 'var(--accent)', color: '#fff', border: 'none',
                            borderRadius: 'var(--radius-sm)',
                        }}>Save Notes</button>
                    </div>

                    <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                        <a href={listing.url} target="_blank" rel="noopener" style={{
                            padding: '12px 20px', fontSize: 14, fontWeight: 600, textDecoration: 'none',
                            background: 'var(--surface)', color: 'var(--accent)', border: '1.5px solid var(--accent)',
                            borderRadius: 'var(--radius-sm)', display: 'inline-block',
                        }}>View on {listing.source === 'zillow' ? 'Zillow' : 'Redfin'} ↗</a>
                        <button onClick={reanalyze} style={{
                            padding: '12px 20px', fontSize: 14, fontWeight: 600,
                            background: 'var(--purple-soft)', color: 'var(--purple)',
                            border: '1.5px solid var(--purple)', borderRadius: 'var(--radius-sm)',
                        }}>Re-analyze</button>
                    </div>
                </div>
            );
        }

        function ScoreCard({ label, value, max, detail }) {
            return (
                <div style={{ background: 'var(--surface)', borderRadius: 'var(--radius-sm)',
                    border: '1px solid var(--border)', padding: 16, textAlign: 'center' }}>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 600,
                        textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>{label}</div>
                    <ScoreDot value={value} max={max} size={44} />
                    {detail && <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 6 }}>{detail}</div>}
                </div>
            );
        }

        function App() {
            const [listings, setListings] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showAdd, setShowAdd] = useState(false);
            const [selectedId, setSelectedId] = useState(null);
            const [sortBy, setSortBy] = useState('created_at');

            const fetchListings = useCallback(async () => {
                try {
                    const data = await api(`/listings?sort_by=${sortBy}&order=desc`);
                    setListings(data);
                } catch (e) {
                    console.error('Failed to fetch listings:', e);
                } finally {
                    setLoading(false);
                }
            }, [sortBy]);

            useEffect(() => { fetchListings(); }, [fetchListings]);

            if (selectedId) {
                return <DetailView listingId={selectedId} onBack={() => { setSelectedId(null); fetchListings(); }} />;
            }

            return (
                <div style={{ maxWidth: 900, margin: '0 auto', padding: '20px 16px 80px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
                        <div>
                            <h1 style={{ fontSize: 24, fontWeight: 700, letterSpacing: '-0.02em' }}>Home Tracker</h1>
                            <p style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 2 }}>Barrington, RI</p>
                        </div>
                        <button onClick={() => setShowAdd(true)} style={{
                            padding: '10px 18px', fontSize: 15, fontWeight: 600,
                            background: 'var(--accent)', color: '#fff', border: 'none',
                            borderRadius: 'var(--radius-sm)', boxShadow: 'var(--shadow)',
                        }}>+ Add Home</button>
                    </div>

                    {listings.length > 0 && (
                        <div style={{ display: 'flex', gap: 6, marginBottom: 20, overflowX: 'auto', paddingBottom: 4 }}>
                            {[
                                { key: 'created_at', label: 'Recent' },
                                { key: 'price', label: 'Price' },
                                { key: 'bedrooms', label: 'Beds' },
                                { key: 'sqft', label: 'Size' },
                            ].map(opt => (
                                <button key={opt.key} onClick={() => setSortBy(opt.key)} style={{
                                    padding: '7px 14px', fontSize: 13, fontWeight: 500, whiteSpace: 'nowrap',
                                    background: sortBy === opt.key ? 'var(--text)' : 'var(--surface)',
                                    color: sortBy === opt.key ? '#fff' : 'var(--text-secondary)',
                                    border: '1px solid var(--border)', borderRadius: 20,
                                }}>{opt.label}</button>
                            ))}
                        </div>
                    )}

                    {loading ? (
                        <div style={{ textAlign: 'center', padding: 60, color: 'var(--text-muted)' }}>Loading your listings...</div>
                    ) : listings.length === 0 ? (
                        <div style={{
                            textAlign: 'center', padding: '80px 24px',
                            background: 'var(--surface)', borderRadius: 'var(--radius)',
                            border: '1px solid var(--border)',
                        }}>
                            <div style={{ fontSize: 40, marginBottom: 16 }}>🏡</div>
                            <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 8 }}>No homes tracked yet</div>
                            <div style={{ fontSize: 14, color: 'var(--text-muted)', marginBottom: 20 }}>
                                Paste a Zillow or Redfin link to get started
                            </div>
                            <button onClick={() => setShowAdd(true)} style={{
                                padding: '12px 24px', fontSize: 15, fontWeight: 600,
                                background: 'var(--accent)', color: '#fff', border: 'none',
                                borderRadius: 'var(--radius-sm)',
                            }}>Add Your First Home</button>
                        </div>
                    ) : (
                        <div style={{
                            display: 'grid',
                            gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
                            gap: 16,
                        }}>
                            {listings.map(listing => (
                                <ListingCard key={listing.id} listing={listing} onClick={() => setSelectedId(listing.id)} />
                            ))}
                        </div>
                    )}

                    <AddListingModal isOpen={showAdd} onClose={() => setShowAdd(false)}
                        onAdd={newListing => { setListings(prev => [newListing, ...prev]); }} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
